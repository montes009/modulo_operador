  function bindEvents(){
    // Tabs
    document.querySelectorAll('.tab').forEach(t=>{
      t.onclick=()=>{
        activeTab = t.dataset.tab;
        showAddEquipo=false; showAddAlquiler=false; showAddCot=false; showAddOrden=false; showAddProvLog=false; showAddOperario=false;
        document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
        t.classList.add('active');
        render();
      };
    });

    // Bell -> Alertas
    $('#btnBell').onclick=()=>{
      document.querySelector('.tab[data-tab="alertas"]').click();
    };

    // Asistente
    const btnAssist = $('#btnAssist');
    if(btnAssist) btnAssist.onclick=openAssist;
    const assistClose = $('#assistClose');
    if(assistClose) assistClose.onclick=closeAssist;
    const assistSend = $('#assistSend');
    if(assistSend) assistSend.onclick=assistHandle;
    const assistInput = $('#assistInput');
    if(assistInput) assistInput.onkeydown=(e)=>{ if(e.key==='Enter') assistHandle(); };

    // Equipos
    const btnAddEq = $('#btnAddEq');
    if(btnAddEq) btnAddEq.onclick=()=>{ 
      showAddEquipo=!showAddEquipo; 
      if(!showAddEquipo) equipoEditando = null; // Resetear modo edición al cerrar
      render(); 
    };

    // Dropdown filtro de tipos
    const btnFiltroTipo = $('#btnFiltroTipo');
    const dropdownFiltroTipo = $('#dropdownFiltroTipo');
    
    if(btnFiltroTipo && dropdownFiltroTipo){
      btnFiltroTipo.onclick = function(e){
        e.stopPropagation();
        
        // Calcular posición del botón
        const rect = btnFiltroTipo.getBoundingClientRect();
        dropdownFiltroTipo.style.position = 'fixed';
        dropdownFiltroTipo.style.top = (rect.bottom + 4) + 'px';
        dropdownFiltroTipo.style.left = rect.left + 'px';
        dropdownFiltroTipo.style.zIndex = '1000';
        
        const isVisible = dropdownFiltroTipo.style.display === 'block';
        dropdownFiltroTipo.style.display = isVisible ? 'none' : 'block';
      };
      
      // Cerrar dropdown al hacer clic fuera
      document.addEventListener('click', function(e){
        if(!btnFiltroTipo.contains(e.target) && !dropdownFiltroTipo.contains(e.target)){
          if(dropdownFiltroTipo) dropdownFiltroTipo.style.display = 'none';
        }
      });
      
      // Cerrar al hacer scroll
      window.addEventListener('scroll', function(){
        if(dropdownFiltroTipo) dropdownFiltroTipo.style.display = 'none';
      }, true);
    }
    
    // Items del dropdown de filtro
    document.querySelectorAll('[data-filtro-tipo]').forEach(item => {
      item.onclick = function(e){
        e.stopPropagation();
        const tipo = this.getAttribute('data-filtro-tipo');
        activeTipoEquipo = tipo;
        if(dropdownFiltroTipo) dropdownFiltroTipo.style.display = 'none';
        render();
      };
    });

    const inpSearch = $('#inpSearch');
    if(inpSearch) inpSearch.oninput=(e)=>{ searchTerm=e.target.value; render(); };

    const selStatus = $('#selStatus');
    if(selStatus) selStatus.onchange=(e)=>{ filterStatus=e.target.value; render(); };

    const btnSaveEq = $('#btnSaveEq');
    if(btnSaveEq) btnSaveEq.onclick=agregarEquipo;
    const btnCancelEq = $('#btnCancelEq');
    if(btnCancelEq) btnCancelEq.onclick=()=>{ 
      showAddEquipo=false; 
      equipoEditando = null; // Resetear modo edición
      render(); 
    };

    // Alquileres
    const btnAddAlq = $('#btnAddAlq');
    if(btnAddAlq) btnAddAlq.onclick=()=>{ showAddAlquiler=!showAddAlquiler; render(); };
    const btnSaveAlq = $('#btnSaveAlq');
    if(btnSaveAlq) btnSaveAlq.onclick=agregarAlquiler;
    const btnCancelAlq = $('#btnCancelAlq');
    if(btnCancelAlq) btnCancelAlq.onclick=()=>{ showAddAlquiler=false; render(); };

    // Cotizaciones
    const btnAddCot = $('#btnAddCot');
    if(btnAddCot) btnAddCot.onclick=()=>{ 
      if(!showAddCot){
        showModalCliente=true; 
        clienteSeleccionado=null;
      } else {
        showAddCot=false;
        showModalCliente=false;
        clienteSeleccionado=null;
      }
      render(); 
    };
    const btnSaveCot = $('#btnSaveCot');
    if(btnSaveCot) btnSaveCot.onclick=agregarCotizacion;
    const btnCancelCot = $('#btnCancelCot');
    if(btnCancelCot) btnCancelCot.onclick=()=>{ showAddCot=false; render(); };

    // Configuración - Subtabs
    document.querySelectorAll('.subTab[data-subtab]').forEach(st => {
      st.onclick = () => {
        const subtab = st.dataset.subtab;
        if(activeTab === 'comercial'){
          activeComercialTab = subtab;
        } else if(activeTab === 'configuracion'){
          activeConfigTab = subtab;
        } else if(activeTab === 'logistica'){
          if(subtab.startsWith('log_')){
            activeLogisticaTab = subtab.replace('log_', '');
          } else {
            activeLogisticaTab = subtab;
          }
        }
        render();
      };
    });

    // Tarifas
    const btnVerTarifas = $('#btnVerTarifas');
    if(btnVerTarifas) btnVerTarifas.onclick = openGestionTarifas;
    
    const btnAddTarifa = $('#btnAddTarifa');
    if(btnAddTarifa) btnAddTarifa.onclick = openAddTarifa;
    
    // ═══════ DELEGATED EVENT HANDLER (replaces 45+ querySelectorAll) ═══════
    const view = document.getElementById('view');
    const backdrop = document.getElementById('backdrop');
    if(view && !view._delegated){
      view._delegated = true;
      const handleDelegatedClick = function(e){
        const b = e.target.closest('[data-act]');
        if(!b) return;
        const act = b.dataset.act;
        const id = b.dataset.id;
        const idx = b.dataset.idx ? parseInt(b.dataset.idx) : null;
        const pg = b.dataset.page ? parseInt(b.dataset.page) : 1;
        switch(act){
          // Equipos
          case 'qr': descargarQR(id); break;
          case 'tarifa': openTarifa(id); break;
          case 'eq_ver': openModalEquipo(id); break;
          case 'eq_edit': editarEquipo(id); break;
          case 'hv': openHojaVida(id); break;
          case 'edit_tarifa': case 'edit_tarifa_modal': closeModal(); openEditTarifa(idx); break;
          case 'delete_tarifa': deleteTarifa(idx); break;
          case 'edit_operador': case 'edit_operador_modal': closeModal(); openEditOperador(); break;
          case 'edit_viaticos': case 'edit_viaticos_modal': closeModal(); openEditViaticos(); break;
          case 'delete_tarifa_modal':
            if(confirm('¿Eliminar esta tarifa?')){
              tarifas.splice(idx, 1); guardarDatosLocales(); closeModal(); render(); mostrarToast('🗑️ Tarifa eliminada','error');
            } break;
          // Alquileres
          case 'alq_ver': openModalAlquiler(id); break;
          case 'alq_detalle': alquilerDetalleId=id; showAfiliacion=false; render(); break;
          case 'alq_liquidar': showLiquidacionPanel(id); break;
          case 'alq_dup': duplicarAlquiler(id); break;
          case 'alq_contrato': generarContratoAlquiler(id); break;
          case 'alq_cancelar': cancelarAlquiler(id); break;
          case 'alq_parar': pararAlquiler(id); break;
          case 'alq_pend_despacho': alertarLogisticaDespacho(id); break;
          case 'alq_gen_ol': generarOrdenDesdeAlquiler(id); break;
          // Cotizaciones
          case 'cot_ver': openModalCotizacion(id); break;
          case 'cot_dup': case 'cot_duplicar': duplicarCotizacion(id); break;
          case 'cot_conv': case 'cot_convertir': convertirCotizacionSAMM(id); break;
          case 'cot_add_item': openAddItemCotModal(id); break;
          case 'cot_apr': aprobarCotizacion(id); break;
          case 'cot_cancelar': cancelarCotizacion(id); break;
          // Logística
          case 'ol_ver': verDetalleOrdenLog(id); break;
          case 'ol_programar': cambiarEstadoOrdenLog(id, 'programada'); break;
          case 'ol_despachar': cambiarEstadoOrdenLog(id, 'en_transito'); break;
          case 'ol_completar': cambiarEstadoOrdenLog(id, 'completada'); break;
          case 'ol_facturar': facturarOrdenLogistica(id); break;
          case 'add_grua': agregarGruaAProveedor(b.dataset.prov); break;
          case 'plog_editar': editarTransportistaLogistico(id); break;
          case 'op_editar': editarOperarioTaller(id); break;
          case 'plog_eliminar':
            if(confirm('¿Eliminar este transportista?')){
              const pi = proveedoresLogisticos.findIndex(p=>p.id===id);
              if(pi>=0){ proveedoresLogisticos.splice(pi,1); guardarDatosLocales(); render(); mostrarToast('🗑️ Transportista eliminado'); }
            } break;
          case 'op_eliminar':
            if(confirm('¿Eliminar este operario?')){
              const oi = operariosTaller.findIndex(o=>o.id===id);
              if(oi>=0){ operariosTaller.splice(oi,1); guardarDatosLocales(); render(); mostrarToast('🗑️ Operario eliminado'); }
            } break;
          // Paginadores
          case 'page_eq': pageEq = pg; render(); break;
          case 'page_alq': pageAlq = pg; render(); break;
          case 'page_cot': pageCot = pg; render(); break;
          case 'page_cli': pageCli = pg; render(); break;
          case 'page_prv': pageProveedor = pg; render(); break;
          case 'page_rep': case 'page_mov': pageRepuesto = pg; render(); break;
          case 'page_fac': case 'page_pag': pageFactura = pg; render(); break;
          case 'page_cta': pageCuenta = pg; render(); break;
          case 'page_ol': pageOrden = pg; render(); break;
        }
      };
      view.addEventListener('click', handleDelegatedClick);
      if(backdrop) backdrop.addEventListener('click', handleDelegatedClick);
      // Change delegation (estado-select)
      view.addEventListener('change', function(e){
        const sel = e.target.closest('.estado-select');
        if(sel){ cambiarEstadoEquipo(sel.dataset.equipoId, sel.value); }
      });
    }

    // Logística buttons (by ID, only if present)
    const btnAddOrden = document.getElementById('btnAddOrden');
    if(btnAddOrden) btnAddOrden.onclick = () => { showAddOrden = !showAddOrden; render(); };

    const btnAddOperario = document.getElementById('btnAddOperario');

    const searchOrdenesEl = document.getElementById('searchOrdenes');
    if(searchOrdenesEl) searchOrdenesEl.oninput = function(){ searchOrdenes = this.value; pageOrden = 1; render(); };
    const filtroEstadoOrdenEl = document.getElementById('filtroEstadoOrden');
    if(filtroEstadoOrdenEl) filtroEstadoOrdenEl.onchange = function(){ filtroEstadoOrden = this.value; pageOrden = 1; render(); };
    const searchProvLogEl = document.getElementById('searchProvLog');
    if(searchProvLogEl) searchProvLogEl.oninput = function(){ searchProvLog = this.value; pageProvLog = 1; render(); };
  }

  function agregarEquipo(){
    const sedeId = $('#ne_sede')?.value?.trim();
    const tipo = $('#ne_tipo')?.value?.trim();
    const marca = $('#ne_marca')?.value?.trim();
    const modelo = $('#ne_modelo')?.value?.trim();
    const tarifaRef = $('#ne_tarifaRef')?.value?.trim();
    
    let tarifa = 0;
    let tarifaRefFinal = '';
    
    if(tarifaRef === 'manual'){
      // Tarifa manual
      tarifa = parseFloat($('#ne_tarifa')?.value||'0')||0;
      tarifaRefFinal = '';
    } else if(tarifaRef){
      // Tarifa de la lista
      const tarifaObj = tarifas.find(t => t.ref === tarifaRef);
      if(tarifaObj){
        tarifa = tarifaObj.dia1_3; // Usar tarifa base (1-3 días) como referencia
        tarifaRefFinal = tarifaRef;
      }
    }
    
    if(!sedeId || !tipo || !marca || !modelo || !tarifa){ 
      mostrarToast('⚠️ Completa: Sede, Tipo, Marca, Modelo y Tarifa','warning'); 
      return; 
    }

    // Buscar nombre de sede
    const sedeObj = sedes.find(s => s.id === sedeId);
    const sedeNombre = sedeObj ? sedeObj.nombre : sedeId;
    const hoy = new Date().toISOString().split('T')[0];

    if(equipoEditando){
      // MODO EDICIÓN: Actualizar equipo existente
      const equipo = equipos.find(e => e.id === equipoEditando);
      if(equipo){
        equipo.interno = $('#ne_interno')?.value?.trim()||'';
        equipo.sedeId = sedeId;
        equipo.sede = sedeNombre;
        equipo.tipo = tipo;
        equipo.marca = marca;
        equipo.modelo = modelo;
        equipo.numeroSerie = $('#ne_serie')?.value?.trim()||'';
        equipo.año = parseInt($('#ne_anio')?.value||'0')||0;
        equipo.ubicacion = $('#ne_ubic')?.value?.trim()||equipo.ubicacion;
        equipo.valorAlquilerDia = tarifa;
        equipo.tarifaRef = tarifaRefFinal;
        
        mostrarToast(`✅ Equipo ${equipoEditando} actualizado exitosamente`,'success');
      }
      equipoEditando = null;
    } else {
      // MODO CREACIÓN: Nuevo equipo
      const id = 'MX-'+String(equipos.length+1).padStart(3,'0');

      equipos.push({
        id,
        interno: $('#ne_interno')?.value?.trim()||'',
        sedeId: sedeId,
        sede: sedeNombre,
        tipo, marca, modelo,
        numeroSerie: $('#ne_serie')?.value?.trim()||'',
        año: parseInt($('#ne_anio')?.value||'0')||0,
        estado:'disponible',
        ubicacion: $('#ne_ubic')?.value?.trim()||'Almacén Principal',
        horasUso:0,
        ultimoMantenimiento:hoy,
        proximoMantenimiento:hoy,
        valorAlquilerDia: tarifa,
        tarifaRef: tarifaRefFinal,
        moneda:'COP',
        createdAt:hoy,
        hvOperativa:[], 
        hvComercialAlquileres:[]
      });
      
      mostrarToast(`✅ Equipo ${id} creado exitosamente`,'success');
    }

    guardarDatosLocales();
    showAddEquipo=false;
    pageEq=1;
    render();
  }

  function eliminarEquipo(){
    if(!equipoEditando){
      mostrarToast('⚠️ No hay equipo seleccionado para eliminar','warning');
      return;
    }

    const equipo = equipos.find(e => e.id === equipoEditando);
    if(!equipo){
      mostrarToast('⚠️ Equipo no encontrado','warning');
      return;
    }

    // Verificar si el equipo está alquilado
    if(equipo.estado === 'alquilado'){
      mostrarToast('⚠️ No puedes eliminar un equipo que está actualmente alquilado.\n\nPrimero finaliza el alquiler.','warning');
      return;
    }

    // Confirmar eliminación
    const confirmacion = confirm(
      `⚠️ ¿ESTÁS SEGURO DE ELIMINAR ESTE EQUIPO?\n\n` +
      `Código: ${equipo.id}\n` +
      `Interno: ${equipo.interno}\n` +
      `Modelo: ${equipo.marca} ${equipo.modelo}\n` +
      `Sede: ${equipo.sede}\n\n` +
      `Esta acción NO se puede deshacer.`
    );

    if(!confirmacion) return;

    // Segunda confirmación para estar seguros
    const confirmacion2 = confirm(
      `🔴 ÚLTIMA CONFIRMACIÓN\n\n` +
      `¿Confirmas que quieres eliminar permanentemente el equipo ${equipo.id}?\n\n` +
      `Escribe OK en la siguiente ventana para confirmar.`
    );

    if(!confirmacion2) return;

    // Eliminar equipo del array
    const index = equipos.findIndex(e => e.id === equipoEditando);
    if(index !== -1){
      equipos.splice(index, 1);
      
      mostrarToast(`✅ Equipo ${equipoEditando} eliminado exitosamente`,'success');
      
      equipoEditando = null;
      showAddEquipo = false;
      guardarDatosLocales();
      pageEq = 1;
      render();
    }
  }

  function agregarAlquiler(){
    const cliente = $('#na_cliente')?.value?.trim();
    const inicio = $('#na_inicio')?.value;
    const fin = $('#na_fin')?.value;
    const lugar = $('#na_lugar')?.value?.trim();
    const equipoId = $('#na_equipo')?.value || '';
    
    if(!cliente || !inicio || !fin || !lugar || !equipoId){ 
      mostrarToast('⚠️ Completa: Cliente, Equipo, Fechas y Lugar','warning'); 
      return; 
    }

    if(alqDias <= 0){ 
      mostrarToast('⚠️ La fecha fin debe ser mayor al inicio','warning'); 
      return; 
    }

    const eq = getEq(equipoId);
    if(!eq){ 
      mostrarToast('⚠️ Equipo inválido','error'); 
      return; 
    }
    
    if(eq.estado !== 'disponible'){
      mostrarToast('⚠️ Equipo '+eq.id+' no disponible ('+eq.estado+')','warning');
      return;
    }

    const id = 'ALQ-'+String(alquileres.length+1).padStart(3,'0');
    const transporte = parseFloat($('#na_transporte')?.value||'0')||0;
    const operador = parseFloat($('#na_operador')?.value||'0')||0;
    const viaticos = parseFloat($('#na_viaticos')?.value||'0')||0;

    const total = (alqTarifaDia * alqDias) + transporte + operador + viaticos;

    const nuevoAlquiler = {
      id,
      cliente,
      contacto: $('#na_contacto')?.value?.trim()||'',
      telefono: $('#na_tel')?.value?.trim()||'',
      equipoId,
      fechaInicio: inicio,
      fechaFin: fin,
      lugarEntrega: lugar,
      diasAlquiler: alqDias,
      costodia: alqTarifaDia,
      transporte,
      operador,
      viaticos,
      costoTotal: total,
      estado:'activo',
      createdAt: new Date().toISOString().split('T')[0]
    };
    
    alquileres.push(nuevoAlquiler);

    // Alimentar hoja de vida comercial del equipo
    if(!eq.hvComercialAlquileres) eq.hvComercialAlquileres = [];
    eq.hvComercialAlquileres.push({
      alqId: id,
      cliente: cliente,
      inicio: inicio,
      fin: fin,
      dias: alqDias,
      total: total
    });

    // Actualizar estado del equipo
    eq.estado = 'alquilado';
    eq.ubicacion = lugar;

    // Reset variables
    alqTarifaDia = 0;
    alqDias = 0;

    showAddAlquiler = false;
    pageAlq = 1;
    render();
    
    mostrarToast('✅ Alquiler '+id+' creado. Equipo '+eq.id+' alquilado','success');
  }

  function aprobarCotizacion(id){
    const c = cotizaciones.find(x=>x.id===id);
    if(!c) return;

    if(c.estado === 'aprobada'){
      mostrarToast('✅ Cotización '+id+' ya está aprobada','success');
      return;
    }

    const cliente = c.cliente || '—';
    const total = money(c.total||0);

    if(!confirm('¿Marcar la cotización '+id+' como APROBADA?\n\nCliente: '+cliente+'\nTotal: '+total+'\n\nEsto NO crea alquiler ni orden logística.')){
      return;
    }

    c.estado = 'aprobada';
    c.aprobadaAt = new Date().toISOString().split('T')[0];

    guardarDatosLocales();
    render();
    mostrarToast('✅ Cotización '+id+' aprobada','success');
  }

  function convertirCotizacion(id){
    const c = cotizaciones.find(x=>x.id===id);
    if(!c) return;
    
    if(!c.equipoId){ 
      mostrarToast('⚠️ Asigna un equipo antes de convertir','warning'); 
      return; 
    }
    
    const eq = getEq(c.equipoId);
    if(!eq){ 
      mostrarToast('⚠️ Equipo inválido','error'); 
      return; 
    }
    
    if(eq.estado !== 'disponible'){ 
      mostrarToast('⚠️ Equipo '+eq.id+' no disponible ('+eq.estado+')','warning'); 
      return; 
    }
    
    if(!confirm('¿Convertir cotización '+c.id+' en alquiler activo?\n\nEquipo: '+eq.id+'\nCliente: '+c.cliente+'\nTotal: '+money(c.total)+'\n\nSe creará automáticamente una orden de logística para el despacho.')){
      return;
    }

    const alqId = 'ALQ-'+String(alquileres.length+1).padStart(3,'0');
    const total = (c.tarifaDia * c.dias) + (c.transporte||0) + (c.operador||0) + (c.viaticos||0);
    
    const nuevoAlquiler = {
      id: alqId,
      cliente: c.cliente,
      contacto: c.contacto || '',
      telefono: c.telefono || '',
      equipoId: c.equipoId,
      fechaInicio: c.fechaInicio,
      fechaFin: c.fechaFin,
      lugarEntrega: c.lugarEntrega,
      diasAlquiler: c.dias,
      costodia: c.tarifaDia,
      transporte: c.transporte || 0,
      operador: c.operador || 0,
      viaticos: c.viaticos || 0,
      costoTotal: total,
      estado: 'activo',
      createdAt: new Date().toISOString().split('T')[0]
    };
    
    alquileres.push(nuevoAlquiler);
    
    // Alimentar hoja de vida comercial del equipo
    if(!eq.hvComercialAlquileres) eq.hvComercialAlquileres = [];
    eq.hvComercialAlquileres.push({
      alqId: alqId,
      cliente: c.cliente,
      inicio: c.fechaInicio,
      fin: c.fechaFin,
      dias: c.dias,
      total: total
    });
    
    // Actualizar cotización y equipo
    c.estado = 'aprobada';
    eq.estado = 'alquilado';
    eq.ubicacion = c.lugarEntrega;

    // CREAR ORDEN DE LOGÍSTICA AUTOMÁTICA (despacho)
    const olId = 'OL-' + String(ordenesLogistica.length + 1).padStart(3, '0');
    ordenesLogistica.push({
      id: olId,
      alquilerId: alqId,
      cotizacionId: c.id,
      equipoId: c.equipoId,
      tipo: 'despacho',
      estado: 'pendiente',
      cliente: c.cliente,
      direccionEntrega: c.lugarEntrega,
      comercialResponsable: currentUser ? (currentUser.nombre || currentUser.username) : '',
      operarioId: '', operarioNombre: '',
      proveedorLogId: '', proveedorNombre: '',
      gruaId: '', gruaPlaca: '', gruaTipo: '',
      costoTransporte: c.transporte || 0,
      costoOperario: c.operador || 0,
      costoViaticos: c.viaticos || 0,
      fechaProgramada: c.fechaInicio,
      fechaEjecucion: '',
      horaSalida: '', horaLlegada: '',
      checklist: { revision_equipo:false, documentos_ok:false, firma_entrega:false, fotos_antes:false, fotos_despues:false },
      observaciones: 'Generada automáticamente desde cotización ' + c.id,
      facturado: false, facturaId: '',
      createdAt: new Date().toISOString().split('T')[0],
      createdBy: currentUser ? (currentUser.nombre || currentUser.username) : ''
    });
    
    guardarDatosLocales();

    // Ir a la vista de alquileres en Comercial
    activeTab = 'comercial';
    activeComercialTab = 'alquileres';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    const comercialTab = document.querySelector('.tab[data-tab="comercial"]');
    if(comercialTab) comercialTab.classList.add('active');
    
    render();
    
    mostrarToast('✅ Alquiler '+alqId+' creado desde cotización '+c.id+'\n\n📦 Equipo '+eq.id+' marcado como alquilado.\n🚚 Orden logística '+olId+' creada automáticamente.\n\n→ Ve al módulo de Logística para asignar transportista y operario.','success');
  }

  function cambiarEstadoEquipo(equipoId, nuevoEstado){
    const equipo = equipos.find(e => e.id === equipoId);
    if(!equipo) return;
    
    const estadoAnterior = equipo.estado;
    equipo.estado = nuevoEstado;
    
    // Actualizar ubicación según estado
    if(nuevoEstado === 'disponible'){
      equipo.ubicacion = `Almacén ${equipo.sede}`;
    } else if(nuevoEstado === 'mantenimiento'){
      equipo.ubicacion = `Taller ${equipo.sede}`;
    } else if(nuevoEstado === 'alistamiento'){
      equipo.ubicacion = `Alistamiento - ${equipo.sede}`;
    } else if(nuevoEstado === 'varado'){
      equipo.ubicacion = `Varado - ${equipo.sede}`;
    }
    
    guardarDatosLocales();
    render();
    
    setTimeout(() => {
      mostrarToast(`✅ Estado de ${equipoId} actualizado\n\n${estadoAnterior} → ${nuevoEstado}`,'success');
    }, 100);
  }

  function cargarMetaMes(){
    const mesKey = document.getElementById('metaMesInput')?.value;
    if(!mesKey) return;
    const meta = metasIngresos[mesKey] || {};
    const g = document.getElementById('metaGlobal');
    const m = document.getElementById('metaMedellin');
    const b = document.getElementById('metaBogota');
    const bq = document.getElementById('metaBarranquilla');
    if(g) g.value = meta.global || '';
    if(m) m.value = meta.medellin || '';
    if(b) b.value = meta.bogota || '';
    if(bq) bq.value = meta.barranquilla || '';
    mostrarToast('📋 Metas cargadas para ' + mesKey);

  function guardarMetaMes(){
    if(currentUser.role !== 'admin'){ mostrarToast('⚠️ Solo el administrador puede modificar metas', '#dc2626','warning'); return; }
    const mesKey = document.getElementById('metaMesInput')?.value;
    if(!mesKey){ mostrarToast('⚠️ Selecciona un mes', '#dc2626','warning'); return; }
    metasIngresos[mesKey] = {
      global: parseInt(document.getElementById('metaGlobal')?.value) || 0,
      medellin: parseInt(document.getElementById('metaMedellin')?.value) || 0,
      bogota: parseInt(document.getElementById('metaBogota')?.value) || 0,
      barranquilla: parseInt(document.getElementById('metaBarranquilla')?.value) || 0
    };
    guardarDatosLocales();
    mostrarToast('🎯 Meta guardada para ' + mesKey);
  }

  // ========= DESCARGAR RESUMEN DASHBOARD =========
  function descargarResumenDashboard(){
    const mesLabel = getMesLabel(dashboardMesOffset);
    const mesKey = getMesKey(dashboardMesOffset);
    const {inicio: mesInicio, fin: mesFin} = getMesRange(dashboardMesOffset);
    const sedeNombre = activeSedeFilter === 'todas' ? 'Todas las sedes' : activeSedeFilter;
    const equiposSede = activeSedeFilter === 'todas' ? equipos : equipos.filter(e => e.sedeId === activeSedeFilter);
    const alqMes = alquileres.filter(a => {
      const enMes = a.fechaInicio <= mesFin && a.fechaFin >= mesInicio;
      const enSede = activeSedeFilter === 'todas' || (getEq(a.equipoId)?.sedeId === activeSedeFilter);
      return enMes && enSede;
    });
    const ingresosMes = alqMes.filter(a=>a.estado==='activo'||a.estado==='finalizado'||a.estado==='parado').reduce((s,a)=>s+(a.costoTotal||0),0);
    const metaMes = metasIngresos[mesKey] || {};
    const metaValor = activeSedeFilter === 'todas' ? (metaMes.global||0) : (metaMes[activeSedeFilter]||0);

    let txt = '═══════════════════════════════════════\n';
    txt += '     ALCÓN OPS — RESUMEN DASHBOARD\n';
    txt += '═══════════════════════════════════════\n\n';
    txt += 'Período: ' + mesLabel + '\n';
    txt += 'Sede: ' + sedeNombre + '\n';
    txt += 'Generado: ' + new Date().toLocaleString('es-CO') + '\n\n';
    txt += '─── EQUIPOS ───\n';
    txt += 'Total: ' + equiposSede.length + '\n';
    txt += 'Disponibles: ' + equiposSede.filter(e=>e.estado==='disponible').length + '\n';
    txt += 'Alquilados: ' + equiposSede.filter(e=>e.estado==='alquilado').length + '\n';
    txt += 'Mantenimiento: ' + equiposSede.filter(e=>e.estado==='mantenimiento').length + '\n\n';
    txt += '─── FINANCIERO ───\n';
    txt += 'Ingresos del mes: ' + money(ingresosMes) + '\n';
    if(metaValor > 0) txt += 'Meta: ' + money(metaValor) + ' (' + (metaValor>0?((ingresosMes/metaValor*100).toFixed(1)):0) + '% cumplimiento)\n';
    txt += 'Alquileres del mes: ' + alqMes.length + '\n';
    txt += 'Activos: ' + alqMes.filter(a=>a.estado==='activo').length + '\n\n';
    txt += '─── DETALLE ALQUILERES ACTIVOS ───\n';
    alqMes.filter(a=>a.estado==='activo').forEach(a => {
      const eq = getEq(a.equipoId);
      txt += '• ' + a.id + ' | ' + a.cliente + ' | ' + (eq?eq.marca+' '+eq.modelo:'') + ' | ' + money(a.costoTotal) + '\n';
    });
    txt += '\n═══════════════════════════════════════\n';

    const blob = new Blob([txt], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'resumen_' + sedeNombre.replace(/\s/g,'_') + '_' + mesKey + '.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    mostrarToast('📥 Resumen descargado');
  }

  function confirmarPararAlquiler(id){

    const alq = alquileres.find(a => a.id === id);
    if(!alq) return;
    alq.estado = 'parado';
    alq.motivoParada = motivo;
    alq.fechaParada = new Date().toISOString().split('T')[0];
    alq.paradoPor = currentUser.nombre || currentUser.username;

  // ========= METAS DE INGRESOS =========
  function cargarMetaMes(){
    const mesKey = document.getElementById('metaMesInput')?.value;
    if(!mesKey) return;
    const meta = metasIngresos[mesKey] || {};
    const g = document.getElementById('metaGlobal');
    const m = document.getElementById('metaMedellin');
    const b = document.getElementById('metaBogota');
    const bq = document.getElementById('metaBarranquilla');
    if(g) g.value = meta.global || '';
    if(m) m.value = meta.medellin || '';
    if(b) b.value = meta.bogota || '';
    if(bq) bq.value = meta.barranquilla || '';
    mostrarToast('📋 Metas cargadas para ' + mesKey);
  }
  function guardarMetaMes(){
    if(currentUser.role !== 'admin'){ mostrarToast('⚠️ Solo el administrador puede modificar metas', '#dc2626','warning'); return; }
    const mesKey = document.getElementById('metaMesInput')?.value;
    if(!mesKey){ mostrarToast('⚠️ Selecciona un mes', '#dc2626','warning'); return; }
    metasIngresos[mesKey] = {
      global: parseInt(document.getElementById('metaGlobal')?.value) || 0,
      medellin: parseInt(document.getElementById('metaMedellin')?.value) || 0,
      bogota: parseInt(document.getElementById('metaBogota')?.value) || 0,
      barranquilla: parseInt(document.getElementById('metaBarranquilla')?.value) || 0
    };
    guardarDatosLocales();
    mostrarToast('🎯 Meta guardada para ' + mesKey);
  }

  // ========= DESCARGAR RESUMEN DASHBOARD =========
  function descargarResumenDashboard(){
    const mesLabel = getMesLabel(dashboardMesOffset);
    const mesKey = getMesKey(dashboardMesOffset);
    const {inicio: mesInicio, fin: mesFin} = getMesRange(dashboardMesOffset);
    const sedeNombre = activeSedeFilter === 'todas' ? 'Todas las sedes' : activeSedeFilter;
    const equiposSede = activeSedeFilter === 'todas' ? equipos : equipos.filter(e => e.sedeId === activeSedeFilter);
    const alqMes = alquileres.filter(a => {
      const enMes = a.fechaInicio <= mesFin && a.fechaFin >= mesInicio;
      const enSede = activeSedeFilter === 'todas' || (getEq(a.equipoId)?.sedeId === activeSedeFilter);
      return enMes && enSede;
    });
    const ingresosMes = alqMes.filter(a=>a.estado==='activo'||a.estado==='finalizado'||a.estado==='parado').reduce((s,a)=>s+(a.costoTotal||0),0);
    const metaMes = metasIngresos[mesKey] || {};
    const metaValor = activeSedeFilter === 'todas' ? (metaMes.global||0) : (metaMes[activeSedeFilter]||0);

    let txt = '═══════════════════════════════════════\n';
    txt += '     ALCÓN OPS — RESUMEN DASHBOARD\n';
    txt += '═══════════════════════════════════════\n\n';
    txt += 'Período: ' + mesLabel + '\n';
    txt += 'Sede: ' + sedeNombre + '\n';
    txt += 'Generado: ' + new Date().toLocaleString('es-CO') + '\n\n';
    txt += '─── EQUIPOS ───\n';
    txt += 'Total: ' + equiposSede.length + '\n';
    txt += 'Disponibles: ' + equiposSede.filter(e=>e.estado==='disponible').length + '\n';
    txt += 'Alquilados: ' + equiposSede.filter(e=>e.estado==='alquilado').length + '\n';
    txt += 'Mantenimiento: ' + equiposSede.filter(e=>e.estado==='mantenimiento').length + '\n\n';
    txt += '─── FINANCIERO ───\n';
    txt += 'Ingresos del mes: ' + money(ingresosMes) + '\n';
    if(metaValor > 0) txt += 'Meta: ' + money(metaValor) + ' (' + (metaValor>0?((ingresosMes/metaValor*100).toFixed(1)):0) + '% cumplimiento)\n';
    txt += 'Alquileres del mes: ' + alqMes.length + '\n';
    txt += 'Activos: ' + alqMes.filter(a=>a.estado==='activo').length + '\n\n';
    txt += '─── DETALLE ALQUILERES ACTIVOS ───\n';
    alqMes.filter(a=>a.estado==='activo').forEach(a => {
      const eq = getEq(a.equipoId);
      txt += '• ' + a.id + ' | ' + a.cliente + ' | ' + (eq?eq.marca+' '+eq.modelo:'') + ' | ' + money(a.costoTotal) + '\n';
    });
    txt += '\n═══════════════════════════════════════\n';

    const blob = new Blob([txt], { type: 'text/plain' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'resumen_' + sedeNombre.replace(/\s/g,'_') + '_' + mesKey + '.txt';
    document.body.appendChild(a); a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    mostrarToast('📥 Resumen descargado');
  }

    const v = ($('#assistInput')?.value||'').trim().toLowerCase();

    if(v==='1'){

      $('#assistBubble').textContent = "Equipos en mantenimiento/varados:\n"+list;

      $('#assistBubble').textContent = "Ingresos (alquileres activos):\n"+money(ingresos);

  function recordAlquilerToHojaVida(eqId, alq){
    const eq = getEq(eqId);
    if(!eq) return;
    if(!Array.isArray(eq.hvComercialAlquileres)) eq.hvComercialAlquileres = [];
    // Guardamos un snapshot mínimo (para offline)
    eq.hvComercialAlquileres.push({
      alqId: alq.id,
      cliente: alq.cliente,
      inicio: alq.fechaInicio,
      fin: alq.fechaFin,
      dias: alq.diasAlquiler,
      total: alq.costoTotal
    });
  }

  function kpiEquipoComercial(eqId){
    const eq = getEq(eqId);
    const items = (eq && Array.isArray(eq.hvComercialAlquileres)) ? eq.hvComercialAlquileres : [];
    const total = items.reduce((s,x)=>s+(Number(x.total)||0),0);
    const dias = items.reduce((s,x)=>s+(Number(x.dias)||0),0);
    const clientes = Array.from(new Set(items.map(x=>String(x.cliente||'').trim()).filter(Boolean)));
    // Utilización demo: días alquilados / 365
    const util = Math.min(100, (dias/365)*100);
    return { total, dias, clientes, util };
  }

  function agregarItemCotizacion(cotId, item){
    const cot = cotizaciones.find(c=>c.id===cotId);
    if(!cot) return;
    if(!cot.items) cot.items=[];
    item.id='ITEM-'+String(cot.items.length+1).padStart(2,'0');
    cot.items.push(item);
    cot.total = cot.items.reduce((s,i)=>{ i.subtotal=(i.tarifaDia||0)*(i.dias||0); return s+i.subtotal; },0) + (cot.transporte||0)+(cot.operador||0)+(cot.viaticos||0)+(cot.otros||0);
    logEvento('cotizacion',cotId,'item_agregado',item);
    guardarDatosLocales();
  }

  function doAddItemCot(cotId){
    const tipo=$('#ci_tipo')?.value?.trim(); if(!tipo){mostrarToast('⚠️ Ingresa tipo','warning');return;}
    agregarItemCotizacion(cotId,{tipoEquipo:tipo, altura:$('#ci_altura')?.value?.trim()||'', cantidad:parseInt($('#ci_cant')?.value||'1'), tarifaDia:parseFloat($('#ci_tarifa')?.value||'0'), dias:parseInt($('#ci_dias')?.value||'0')});
    closeModal(); render(); mostrarToast('✅ Item agregado','success');

  // ─── CONVERSIÓN COTIZACIÓN → ALQUILER (SAMM) ───
  function convertirCotizacionSAMM(cotId){
    const cot = cotizaciones.find(c=>c.id===cotId);
    if(!cot) return;
    if(cot.estado!=='aprobada' && cot.estado!=='pendiente'){mostrarToast('⚠️ Aprueba la cotización antes de convertir','warning');return;}
    const tieneItems = cot.items && cot.items.length>0;
    const tieneEquipo = !!cot.equipoId;
    if(!tieneItems && !tieneEquipo){mostrarToast('⚠️ Agrega items o equipo a la cotización','warning');return;}
    if(!confirm('¿Convertir '+cot.id+' en alquiler?\\nCliente: '+cot.cliente+'\\nTotal: '+money(cot.total)+'\\n\\nSe creará en estado PENDIENTE para afiliar equipos reales.')) return;

    const alqId = nextId('ALQ', alquileres);
    alquileres.push({
      id:alqId, cotizacionId:cot.id, clienteId:cot.clienteId||null, cliente:cot.cliente,
      contacto:cot.contacto||'', telefono:cot.telefono||'', fechaInicio:cot.fechaInicio, fechaFin:cot.fechaFin,
      lugarEntrega:cot.lugarEntrega, diasAlquiler:cot.dias||0,
      transporte:cot.transporte||0, operador:cot.operador||0, viaticos:cot.viaticos||0,
      costoTotal:cot.total||0,
      estado:'pendiente_afiliacion',
      items: tieneItems ? cot.items.map(i=>({...i})) : (tieneEquipo ? [{id:'ITEM-01',tipoEquipo:getEq(cot.equipoId)?.tipo||'',altura:getEq(cot.equipoId)?.altura||'',cantidad:1,tarifaDia:cot.tarifaDia||0,dias:cot.dias||0,subtotal:(cot.tarifaDia||0)*(cot.dias||0),equipoIdSugerido:cot.equipoId}] : []),
      createdAt:new Date().toISOString().split('T')[0], hvOperativa:[], hvComercialAlquileres:[]
    });
    cot.estado='convertida'; cot.alquilerId=alqId;
    logEvento('cotizacion',cot.id,'convertida',{alquilerId:alqId});
    logEvento('alquiler',alqId,'creado',{cotizacionId:cot.id});
    if(tieneEquipo && !tieneItems) afiliarEquipoAlAlquiler(alqId, cot.equipoId, cot.tarifaDia||0, cot.dias||0);
    guardarDatosLocales();
    mostrarToast('✅ Alquiler '+alqId+' creado — afilia equipos','success');
    activeComercialTab='alquileres'; alquilerDetalleId=alqId; render();
  }

  // ─── AFILIACIÓN DE EQUIPOS ───
  function afiliarEquipoAlAlquiler(alquilerId, equipoId, tarifa, dias){
    const alq=alquileres.find(a=>a.id===alquilerId); const eq=getEq(equipoId);
    if(!alq||!eq) return false;
    if(eq.estado!=='disponible'){mostrarToast('⚠️ '+eq.id+' no disponible ('+eq.estado+')','warning');return false;}
    if(alquilerEquipos.find(ae=>ae.alquilerId===alquilerId&&ae.equipoId===equipoId)){mostrarToast('⚠️ Ya afiliado','warning');return false;}
    const aeId='AE-'+String(alquilerEquipos.length+1).padStart(3,'0');
    alquilerEquipos.push({id:aeId,alquilerId,equipoId,periodoCobro:'dia',tarifaAplicada:tarifa||0,diasCotizados:dias||alq.diasAlquiler||0,fechaDespachoReal:null,fechaCompromisoDevolucion:alq.fechaFin||null,fechaDevolucionReal:null,horometroSalida:null,horometroEntrada:null,estado:'afiliado',olEntregaId:null,olRecogidaId:null});
    eq.estado='reservado'; eq.ubicacion='Reservado — '+alq.cliente;
    logEvento('equipo',equipoId,'reservado',{alquilerId});
    recalcularEstadoAlquiler(alquilerId);
    guardarDatosLocales();
    return true;
  }

  function desafiliarEquipo(aeId){
    const ae=alquilerEquipos.find(x=>x.id===aeId);
    if(!ae) return;
    if(ae.estado!=='afiliado'){mostrarToast('⚠️ Solo se puede desafiliar en estado afiliado','warning');return;}
    if(!confirm('¿Desafiliar equipo '+ae.equipoId+'?')) return;
    const eq=getEq(ae.equipoId); if(eq) eq.estado='disponible';
    const idx=alquilerEquipos.indexOf(ae); if(idx>=0) alquilerEquipos.splice(idx,1);
    logEvento('alquiler_equipo',aeId,'desafiliado',{equipoId:ae.equipoId});
    recalcularEstadoAlquiler(ae.alquilerId);
    guardarDatosLocales(); render(); mostrarToast('🗑️ Equipo desafiliado','success');
  }

  // ─── CREAR OL ENTREGA / RECOGIDA ───
  function crearOLParaEquipo(aeId, tipo){
    const ae=alquilerEquipos.find(x=>x.id===aeId); if(!ae) return;
    const alq=alquileres.find(a=>a.id===ae.alquilerId); if(!alq) return;
    if(tipo==='entrega'&&ae.olEntregaId){mostrarToast('⚠️ Ya existe OL entrega','warning');return;}
    if(tipo==='recogida'&&ae.olRecogidaId){mostrarToast('⚠️ Ya existe OL recogida','warning');return;}
    if(tipo==='recogida'&&ae.estado!=='en_alquiler'){mostrarToast('⚠️ Equipo debe estar en alquiler','warning');return;}
    const olId=nextId('OL',ordenesLogistica);
    ordenesLogistica.push({
      id:olId, alquilerId:alq.id, cotizacionId:alq.cotizacionId||'', equipoId:ae.equipoId, alquilerEquipoId:ae.id,
      tipo:tipo==='entrega'?'despacho':'recogida', estado:'pendiente',
      cliente:alq.cliente, direccionEntrega:alq.lugarEntrega,
      comercialResponsable:currentUser?(currentUser.nombre||currentUser.username):'',
      operarioId:'',operarioNombre:'',proveedorLogId:'',proveedorNombre:'',
      gruaId:'',gruaPlaca:'',gruaTipo:'',
      costoTransporte:0,costoOperario:0,costoViaticos:0,
      fechaProgramada:tipo==='entrega'?alq.fechaInicio:alq.fechaFin, fechaEjecucion:'',
      horaSalida:'',horaLlegada:'',
      checklist:{revision_equipo:false,documentos_ok:false,firma_entrega:false,fotos_antes:false,fotos_despues:false},
      evidenciaFotos:[], observaciones:'', facturado:false, facturaId:'',
      createdAt:new Date().toISOString().split('T')[0], createdBy:currentUser?(currentUser.nombre||currentUser.username):''
    });
    if(tipo==='entrega') ae.olEntregaId=olId; else ae.olRecogidaId=olId;
    logEvento('orden_logistica',olId,'creada',{tipo,equipoId:ae.equipoId});
    guardarDatosLocales(); mostrarToast('✅ OL '+olId+' ('+tipo+') creada','success'); render();
  }

  // ─── COMPLETAR OL CON CHECKLIST ───
  function completarOLConChecklist(olId){
    const ol=ordenesLogistica.find(x=>x.id===olId); if(!ol) return;
    const cl=ol.checklist||{};
    if(!(cl.revision_equipo&&cl.documentos_ok&&cl.firma_entrega&&cl.fotos_antes&&cl.fotos_despues)){mostrarToast('⚠️ Completa todo el checklist','warning');return;}
    ol.estado='completada'; ol.fechaEjecucion=ol.fechaEjecucion||new Date().toISOString().split('T')[0];
    logEvento('orden_logistica',olId,'completada',{tipo:ol.tipo});
    const ae=alquilerEquipos.find(x=>x.id===ol.alquilerEquipoId); const eq=getEq(ol.equipoId);
    if(ol.tipo==='despacho'){
      if(ae){ae.estado='en_alquiler';ae.fechaDespachoReal=ol.fechaEjecucion;}
      if(eq){eq.estado='alquilado';eq.ubicacion=ol.direccionEntrega||'En obra';}
    } else if(ol.tipo==='recogida'){
      if(ae){ae.estado='devuelto';ae.fechaDevolucionReal=ol.fechaEjecucion;}
      if(eq){eq.estado='disponible';eq.ubicacion='Almacén '+(eq.sede||'');}
    }
    recalcularEstadoAlquiler(ol.alquilerId);
    guardarDatosLocales(); render(); mostrarToast('✅ OL '+olId+' completada','success');
  }

  // ─── MÁQUINA DE ESTADOS ───
  function recalcularEstadoAlquiler(alquilerId){
    const alq=alquileres.find(a=>a.id===alquilerId); if(!alq) return;
    const eqs=alquilerEquipos.filter(ae=>ae.alquilerId===alquilerId);
    if(eqs.length===0){alq.estado='pendiente_afiliacion';return;}
    if(eqs.every(ae=>ae.estado==='devuelto')) alq.estado='finalizable';
    else if(eqs.some(ae=>ae.estado==='en_alquiler'||ae.estado==='despachado')) alq.estado='activo';
    else if(eqs.every(ae=>ae.estado==='afiliado')) alq.estado='pendiente_despacho';
    else alq.estado='activo';
  }
  function recalcularEstadoEquipo(equipoId){
    const eq=getEq(equipoId); if(!eq) return;
    const afiliaciones=alquilerEquipos.filter(ae=>ae.equipoId===equipoId&&ae.estado!=='devuelto');
    if(afiliaciones.length>0){
      eq.estado=afiliaciones.some(ae=>ae.estado==='en_alquiler')?'alquilado':'reservado';
    }
    // No auto-set disponible here — completarOL handles that
  }


  // ─── LIQUIDACIÓN ───
  function calcularLiquidacion(alquilerId){
    const alq=alquileres.find(a=>a.id===alquilerId); if(!alq) return null;
    const eqs=alquilerEquipos.filter(ae=>ae.alquilerId===alquilerId);
    const ols=ordenesLogistica.filter(ol=>ol.alquilerId===alquilerId);
    let detalleEquipos = eqs.map(ae=>{
      const eq=getEq(ae.equipoId); let diasReales=ae.diasCotizados||0;
      if(ae.fechaDespachoReal&&ae.fechaDevolucionReal){diasReales=Math.max(1,Math.ceil((new Date(ae.fechaDevolucionReal)-new Date(ae.fechaDespachoReal))/(86400000)));}
      else if(ae.fechaDespachoReal){diasReales=Math.max(1,Math.ceil((new Date()-new Date(ae.fechaDespachoReal))/(86400000)));}
      const totalEquipo=ae.tarifaAplicada*diasReales; const diasExtra=Math.max(0,diasReales-(ae.diasCotizados||0));
      return {aeId:ae.id,equipoId:ae.equipoId,equipoNombre:eq?(eq.marca+' '+eq.modelo):ae.equipoId,estado:ae.estado,tarifaDia:ae.tarifaAplicada,diasCotizados:ae.diasCotizados||0,diasReales,diasExtra,totalEquipo,penalidad:diasExtra*ae.tarifaAplicada*0.15,horometroSalida:ae.horometroSalida||0,horometroEntrada:ae.horometroEntrada||0};
    });
    const costosLog=ols.reduce((s,ol)=>s+(ol.costoTransporte||0)+(ol.costoOperario||0)+(ol.costoViaticos||0),0);
    const totEq=detalleEquipos.reduce((s,d)=>s+d.totalEquipo,0);
    const totPen=detalleEquipos.reduce((s,d)=>s+d.penalidad,0);
    return {alquilerId,cliente:alq.cliente,fechaInicio:alq.fechaInicio,fechaFin:alq.fechaFin,detalleEquipos,costosLogisticos:costosLog,totalEquipos:totEq,totalPenalidades:totPen,totalFinal:totEq+costosLog+totPen,ols:ols.length};
  }

  function finalizarLiquidacion(alquilerId){
    const alq=alquileres.find(a=>a.id===alquilerId); if(!alq) return;
    if(alq.estado!=='finalizable'){mostrarToast('⚠️ Alquiler debe estar en estado finalizable','warning');return;}
    const liq=calcularLiquidacion(alquilerId); if(!liq) return;
    if(!confirm('¿Finalizar liquidación '+alquilerId+'?\\nTotal: '+money(liq.totalFinal))) return;
    alq.estado='finalizado'; alq.costoTotal=liq.totalFinal; alq.liquidacion=liq; alq.fechaLiquidacion=new Date().toISOString().split('T')[0];
    logEvento('alquiler',alquilerId,'liquidado',{totalFinal:liq.totalFinal});
    guardarDatosLocales(); mostrarToast('✅ '+alquilerId+' liquidado: '+money(liq.totalFinal),'success'); render();
  }

  function onGruaChange(){
    const gruaSel=$('#ol_grua'); if(!gruaSel) return;
    const gruaId=gruaSel.value;
    const provInput=$('#ol_provNombre');
    const gruaInput=$('#ol_gruaInfo');
    if(!gruaId){if(provInput)provInput.value='';if(gruaInput)gruaInput.value='';return;}
    for(const pl of proveedoresLogisticos){
      if(!pl.gruas) continue;
      const g=pl.gruas.find(x=>x.id===gruaId);
      if(g){
        if(provInput)provInput.value=pl.nombre;
        if(gruaInput)gruaInput.value=g.placa+' — '+g.tipo+' ('+g.capacidad+')';
        break;
      }
    }
  }

  function guardarDatosOL(olId){
    const ol=ordenesLogistica.find(x=>x.id===olId); if(!ol) return;
    _saveOLFields(ol);
    guardarDatosLocales();
    mostrarToast('💾 OL '+olId+' guardada','success');
  }

  function programarOL(olId){
    const ol=ordenesLogistica.find(x=>x.id===olId); if(!ol) return;
    _saveOLFields(ol);
    if(!ol.proveedorLogId && !ol.gruaId){mostrarToast('⚠️ Asigna transportadora/grúa antes de programar','warning');return;}
    if(!ol.fechaProgramada){mostrarToast('⚠️ Ingresa la fecha programada','warning');return;}
    ol.estado='programada';
    logEvento('orden_logistica',olId,'programada',{proveedorLogId:ol.proveedorLogId,gruaId:ol.gruaId,operarioId:ol.operarioId});
    guardarDatosLocales(); closeModal(); render();
    mostrarToast('📋 OL '+olId+' programada con recursos asignados','success');
  }

  // asignarRecursosOL (PDF item 4) — alias for save+programar
  function asignarRecursosOL(olId, operarioId, proveedorId, gruaId){
    const ol=ordenesLogistica.find(x=>x.id===olId); if(!ol) return;
    if(gruaId){
      ol.gruaId=gruaId;
      for(const pl of proveedoresLogisticos){
        if(!pl.gruas) continue;
        const g=pl.gruas.find(x=>x.id===gruaId);
        if(g){ol.proveedorLogId=pl.id;ol.proveedorNombre=pl.nombre;ol.gruaPlaca=g.placa;ol.gruaTipo=g.tipo;break;}
      }
    }
    if(operarioId){
      ol.operarioId=operarioId;
      const op=operariosTaller.find(x=>x.id===operarioId);
      ol.operarioNombre=op?op.nombre:'';
    }
    if(proveedorId) ol.proveedorLogId=proveedorId;
    if(ol.gruaId||ol.operarioId) ol.estado='programada';
    logEvento('orden_logistica',olId,'recursos_asignados',{operarioId,proveedorId,gruaId});
    guardarDatosLocales();
  }

  function _saveOLFields(ol){
    const gruaSel=$('#ol_grua');
    if(gruaSel){
      const gruaId=gruaSel.value; ol.gruaId=gruaId;
      if(gruaId){
        for(const pl of proveedoresLogisticos){
          if(!pl.gruas) continue;
          const g=pl.gruas.find(x=>x.id===gruaId);
          if(g){ol.proveedorLogId=pl.id;ol.proveedorNombre=pl.nombre;ol.gruaPlaca=g.placa;ol.gruaTipo=g.tipo;break;}
        }
      } else {ol.proveedorLogId='';ol.proveedorNombre='';ol.gruaPlaca='';ol.gruaTipo='';}
    }
    const opSel=$('#ol_operario');
    if(opSel){ol.operarioId=opSel.value;const op=operariosTaller.find(x=>x.id===opSel.value);ol.operarioNombre=op?op.nombre:'';}
    const fp=$('#ol_fechaProg');if(fp)ol.fechaProgramada=fp.value;
    const hs=$('#ol_horaSalida');if(hs)ol.horaSalida=hs.value;
    const hl=$('#ol_horaLlegada');if(hl)ol.horaLlegada=hl.value;
    const dir=$('#ol_direccion');if(dir)ol.direccionEntrega=dir.value;
    const ct=$('#ol_costoTransp');if(ct)ol.costoTransporte=parseFloat(ct.value)||0;
    const co=$('#ol_costoOper');if(co)ol.costoOperario=parseFloat(co.value)||0;
    const cv=$('#ol_costoViat');if(cv)ol.costoViaticos=parseFloat(cv.value)||0;
    const obs=$('#cl_obs');if(obs)ol.observaciones=obs.value;
  }

  function updateChecklistItem(olId,key,val){const ol=ordenesLogistica.find(x=>x.id===olId);if(ol){if(!ol.checklist)ol.checklist={};ol.checklist[key]=val;guardarDatosLocales();}}

  function startOLFromChecklist(olId){
    const ol=ordenesLogistica.find(x=>x.id===olId);if(!ol)return;
    _saveOLFields(ol);
    if(!ol.gruaId && !ol.proveedorLogId){mostrarToast('⚠️ Asigna transportadora/grúa antes de iniciar','warning');return;}
    if(!ol.fechaProgramada){mostrarToast('⚠️ Asigna fecha programada','warning');return;}
    const h=$('#cl_horometro')?.value;
    ol.estado='en_transito';
    const ae=alquilerEquipos.find(x=>x.id===ol.alquilerEquipoId);
    if(ae&&h){if(ol.tipo==='despacho')ae.horometroSalida=parseFloat(h);else ae.horometroEntrada=parseFloat(h);}
    logEvento('orden_logistica',olId,'en_transito',{gruaId:ol.gruaId,operarioId:ol.operarioId});
    guardarDatosLocales();closeModal();render();mostrarToast('🚛 OL '+olId+' en tránsito','info');
  }

  function finishOLFromChecklist(olId){
    const ol=ordenesLogistica.find(x=>x.id===olId);if(!ol)return;
    _saveOLFields(ol);
    const h=$('#cl_horometro')?.value;
    const ae=alquilerEquipos.find(x=>x.id===ol.alquilerEquipoId);
    if(ae&&h){if(ol.tipo==='despacho')ae.horometroSalida=parseFloat(h);else ae.horometroEntrada=parseFloat(h);}
    // PDF validation: recogida requires horómetro de entrada

      mostrarToast('⚠️ Ingresa horómetro de entrada antes de completar recogida','warning');return;
    }
    closeModal();completarOLConChecklist(olId);
  }

  // ─── Init con carga desde IndexedDB ───────────────────────────────
  (async function startApp(){
    try {
      await initIndexedDB();
      const saved = await dbCargar('appData');
      if(saved){
        if(saved.equipos?.length)            { equipos.length = 0; equipos.push(...saved.equipos); }
        if(saved.alquileres?.length)         { alquileres.length = 0; alquileres.push(...saved.alquileres); }
        if(saved.cotizaciones?.length)       { cotizaciones.length = 0; cotizaciones.push(...saved.cotizaciones); }
        if(saved.clientes?.length)           { 
          // Merge: conservar clientes guardados + agregar nuevos del código que no existan
          const savedIds = new Set(saved.clientes.map(c => c.id));
          const nuevosDefault = clientes.filter(c => !savedIds.has(c.id));
          clientes.length = 0; 
          clientes.push(...saved.clientes, ...nuevosDefault); 
        }
        if(saved.comprasServicios?.length)   { comprasServicios.length = 0; comprasServicios.push(...saved.comprasServicios); }
        if(saved.cuentasPorPagar?.length)    { cuentasPorPagar.length = 0; cuentasPorPagar.push(...saved.cuentasPorPagar); }
        if(saved.repuestos?.length)          { repuestos.length = 0; repuestos.push(...saved.repuestos); }
        if(saved.movimientosInventario?.length){ movimientosInventario.length = 0; movimientosInventario.push(...saved.movimientosInventario); }
        if(saved.facturas?.length)           { facturas.length = 0; facturas.push(...saved.facturas); }
        if(saved.pagos?.length)              { pagos.length = 0; pagos.push(...saved.pagos); }
        if(saved.alertas?.length)            { alertas.length = 0; alertas.push(...saved.alertas); }
        if(saved.tarifas?.length)            { tarifas.length = 0; tarifas.push(...saved.tarifas); }
        if(saved.adicionales && typeof saved.adicionales === 'object') {
          Object.assign(adicionales, saved.adicionales);
        }
        if(saved.metasIngresos && typeof saved.metasIngresos === 'object') {
          Object.assign(metasIngresos, saved.metasIngresos);
        }
        if(saved.proveedoresLogisticos?.length) { proveedoresLogisticos.length = 0; proveedoresLogisticos.push(...saved.proveedoresLogisticos); }
        if(saved.operariosTaller?.length)       { operariosTaller.length = 0; operariosTaller.push(...saved.operariosTaller); }
        if(saved.ordenesLogistica?.length)      { ordenesLogistica.length = 0; ordenesLogistica.push(...saved.ordenesLogistica); }
        if(saved.alquilerEquipos?.length)       { alquilerEquipos.length = 0; alquilerEquipos.push(...saved.alquilerEquipos); }
        if(saved.logEventos?.length)            { logEventos.length = 0; logEventos.push(...saved.logEventos); }
        console.log('✅ Datos cargados desde IndexedDB | ' + (saved.ultimaActualizacion || 'sin fecha'));
      } else {
        console.log('ℹ️ Primera vez — usando datos de ejemplo predeterminados');
        // Guardar los datos de ejemplo al IndexedDB de inmediato
        await guardarDatosLocales().catch(()=>{});
      }
    } catch(e){
      console.warn('IndexedDB no disponible, usando datos en memoria:', e.message);
    }
    // Hide loading overlay
    const loader = document.getElementById('appLoader');
    if(loader) { loader.style.opacity='0'; loader.style.transition='opacity .4s'; setTimeout(()=>loader.remove(),400); }
    render();
  })();
</script>
</body>
</html>
