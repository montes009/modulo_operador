<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<meta name="theme-color" content="#e5000f"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<title>ALCON OPS — Operador</title>
<link rel="manifest" href="./manifest_operador.json"/>
<meta name="apple-mobile-web-app-title" content="Operador"/>
<meta name="apple-touch-fullscreen" content="yes"/>
<link rel="apple-touch-icon" href="./icon-192.png"/>
<link rel="apple-touch-startup-image" href="./icon-512.png"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --bg0:#080808;--bg1:#111;--bg2:#181818;--bg3:#1f1f1f;--bg4:#282828;
  --red:#e5000f;--red-dim:#9b000a;--red-glow:rgba(229,0,15,.18);
  --border:#2e2e2e;--border2:#3a3a3a;
  --txt:#f0f0f0;--txt2:#aaa;--txt3:#666;
  --green:#22c55e;--green-bg:rgba(34,197,94,.1);
  --yellow:#f59e0b;--yellow-bg:rgba(245,158,11,.1);
  --blue:#3b82f6;--blue-bg:rgba(59,130,246,.1);
  --orange:#ea580c;
  --r:12px;--r2:8px;
  --sh:0 4px 20px rgba(0,0,0,.5);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:'Segoe UI',system-ui,sans-serif;background:var(--bg0);color:var(--txt);min-height:100vh;overflow-x:hidden;-webkit-font-smoothing:antialiased}
a,button,input,select,textarea{font:inherit}

/* ── SCREEN SYSTEM ── */
.screen{display:none;min-height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ── LOADER ── */
#loader{position:fixed;inset:0;z-index:9999;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .5s}
#loader.fade{opacity:0;pointer-events:none}
.ld-bar-wrap{width:200px;height:3px;background:#1a1a1a;border-radius:2px;overflow:hidden}
.ld-bar{height:100%;width:0;background:linear-gradient(90deg,#9b000a,#e5000f);animation:barFill 1.8s ease .3s forwards}
.ld-txt{font-size:11px;letter-spacing:3px;color:#555;text-transform:uppercase}
@keyframes barFill{to{width:100%}}
@keyframes fadeIn{to{opacity:1}}

/* ── LOGIN ── */
#screenLogin{align-items:center;justify-content:center;padding:24px;background:var(--bg0)}
.login-card{background:var(--bg2);border:1px solid var(--border2);border-radius:20px;padding:32px 24px;width:100%;max-width:380px;box-shadow:var(--sh)}
.login-logo{font-size:28px;font-weight:900;letter-spacing:2px;color:var(--red);text-align:center;margin-bottom:4px}
.login-sub{font-size:12px;color:var(--txt3);text-align:center;letter-spacing:2px;text-transform:uppercase;margin-bottom:28px}
.login-label{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block}
.login-input{width:100%;padding:14px 16px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--txt);font-size:16px;margin-bottom:14px;outline:none}
.login-input:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.login-btn{width:100%;padding:16px;background:var(--red);border:0;border-radius:var(--r2);color:#fff;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:.5px;margin-top:4px}
.login-btn:active{background:#c0000d}
.login-btn:disabled{opacity:.6;cursor:not-allowed}
.login-err{font-size:13px;color:var(--red);background:rgba(229,0,15,.08);border:1px solid rgba(229,0,15,.2);border-radius:var(--r2);padding:10px 14px;margin-bottom:14px;display:none}

/* ── HEADER ── */
.hdr{background:var(--bg1);border-bottom:1px solid var(--border);padding:0 16px;height:60px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:100;flex-shrink:0}
.hdr-logo{font-size:16px;font-weight:900;letter-spacing:1.5px;color:var(--red);text-transform:uppercase}
.hdr-sep{width:1px;height:28px;background:var(--border2)}
.hdr-title{font-size:13px;font-weight:700;color:var(--txt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hdr-back{background:transparent;border:0;color:var(--txt3);font-size:22px;cursor:pointer;padding:4px;line-height:1}
.hdr-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--txt2);border-radius:var(--r2);padding:6px 12px;font-size:12px;font-weight:700;cursor:pointer}
.hdr-btn:active{background:var(--bg4)}
.hdr-badge{background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.3);color:#a78bfa;padding:3px 8px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:.5px;white-space:nowrap}

/* ── MAIN SCROLL AREA ── */
.scroll-area{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px}

/* ── BANDEJA / ORDER LIST ── */
.section-title{font-size:11px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;color:var(--txt3);margin-bottom:12px}
.orden-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:12px;cursor:pointer;transition:border-color .15s,transform .1s}
.orden-card:active{transform:scale(.98)}
.orden-card:hover{border-color:var(--border2)}
.orden-card.urgente{border-left:4px solid var(--red)}
.orden-card.alta{border-left:4px solid var(--orange)}
.orden-card.normal{border-left:4px solid var(--border2)}
.oc-top{padding:14px 16px;display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.oc-tipo{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:4px}
.oc-titulo{font-size:15px;font-weight:700;color:var(--txt);line-height:1.3}
.oc-meta{font-size:12px;color:var(--txt3);margin-top:4px}
.oc-status{flex-shrink:0}
.oc-foot{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;gap:8px;background:var(--bg3)}
.oc-maquina{font-size:12px;font-weight:700;color:var(--blue)}
.oc-cliente{font-size:12px;color:var(--txt3);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.empty-state{text-align:center;padding:60px 20px}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.3}
.empty-txt{font-size:14px;color:var(--txt3)}

/* ── PILLS ── */
.pill{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:10px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;white-space:nowrap}
.pill-pendiente{background:var(--yellow-bg);color:var(--yellow);border:1px solid rgba(245,158,11,.25)}
.pill-asignada{background:var(--blue-bg);color:var(--blue);border:1px solid rgba(59,130,246,.25)}
.pill-en_proceso{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.pill-completada{background:var(--green-bg);color:var(--green);border:1px solid rgba(34,197,94,.25)}
.pill-con_novedad{background:rgba(234,88,12,.12);color:var(--orange);border:1px solid rgba(234,88,12,.25)}
.pill-cancelada{background:rgba(102,102,102,.1);color:var(--txt3);border:1px solid rgba(102,102,102,.2)}

/* ── TABS ── */
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);background:var(--bg1);flex-shrink:0;overflow-x:auto;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab-btn{border:0;background:transparent;color:var(--txt3);padding:14px 16px;font-size:12px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;flex-shrink:0}
.tab-btn.active{color:var(--red);border-bottom-color:var(--red)}

/* ── DETAIL INFO ── */
.info-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:14px}
.info-row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid var(--border);font-size:13px}
.info-row:last-child{border-bottom:0}
.info-lbl{color:var(--txt3);flex-shrink:0;margin-right:12px}
.info-val{font-weight:600;color:var(--txt);text-align:right;word-break:break-word}

/* ── CHECKLIST ── */
.chk-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:14px 16px;margin-bottom:10px}
.chk-label{font-size:14px;font-weight:600;color:var(--txt);margin-bottom:10px}
.chk-btns{display:flex;gap:8px}
.chk-btn{flex:1;padding:10px;border:1px solid var(--border2);border-radius:var(--r2);background:var(--bg3);color:var(--txt3);font-size:12px;font-weight:700;cursor:pointer;text-align:center;transition:all .15s}
.chk-btn:active{transform:scale(.96)}
.chk-btn.sel-bueno{background:rgba(34,197,94,.15);border-color:rgba(34,197,94,.4);color:var(--green)}
.chk-btn.sel-malo{background:rgba(229,0,15,.12);border-color:rgba(229,0,15,.3);color:var(--red)}
.chk-btn.sel-na{background:rgba(102,102,102,.15);border-color:rgba(102,102,102,.3);color:var(--txt3)}
.chk-comment{width:100%;margin-top:8px;padding:8px 12px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--txt);font-size:13px;resize:none;outline:none;display:none}
.chk-comment.show{display:block}
.chk-comment:focus{border-color:var(--red)}

/* ── FOTOS ── */
.foto-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
.foto-item{aspect-ratio:1;border-radius:var(--r2);overflow:hidden;position:relative;background:var(--bg3);border:1px solid var(--border)}
.foto-item img{width:100%;height:100%;object-fit:cover}
.foto-del{position:absolute;top:4px;right:4px;background:rgba(0,0,0,.7);border:0;border-radius:50%;width:24px;height:24px;color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.foto-add{aspect-ratio:1;border-radius:var(--r2);border:2px dashed var(--border2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:pointer;background:var(--bg3)}
.foto-add:active{background:var(--bg4)}
.foto-add-icon{font-size:28px;color:var(--txt3)}
.foto-add-txt{font-size:11px;color:var(--txt3);text-align:center}
input[type=file]{display:none}

/* ── FIRMA ── */
#firmaCanvas{width:100%;border-radius:var(--r2);border:2px dashed var(--border2);background:#fff;cursor:crosshair;touch-action:none}
.firma-btns{display:flex;gap:8px;margin-top:10px}
.firma-estado{margin-top:8px;font-size:12px;color:var(--green);display:none}
.firma-estado.show{display:block}

/* ── COMENTARIOS ── */
.com-item{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;margin-bottom:10px}
.com-meta{font-size:11px;color:var(--txt3);margin-bottom:6px}
.com-txt{font-size:13px;color:var(--txt);line-height:1.5}

/* ── ESTADO CAMBIO ── */
.estado-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.estado-opt{padding:14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);text-align:center;cursor:pointer;transition:all .15s}
.estado-opt:active{transform:scale(.96)}
.estado-opt.sel{border-color:var(--red);background:rgba(229,0,15,.08)}
.estado-opt-icon{font-size:22px;margin-bottom:6px}
.estado-opt-txt{font-size:12px;font-weight:700;color:var(--txt2)}

/* ── BUTTONS ── */
.btn{border:0;cursor:pointer;border-radius:var(--r2);padding:14px 20px;font-weight:700;font-size:14px;display:inline-flex;align-items:center;justify-content:center;gap:8px;transition:all .15s;width:100%}
.btn-primary{background:var(--red);color:#fff}
.btn-primary:active{background:#c0000d}
.btn-primary:disabled{opacity:.5;cursor:not-allowed}
.btn-ghost{background:transparent;color:var(--txt3);border:1px solid var(--border)}
.btn-ghost:active{background:var(--bg3)}
.btn-success{background:#15803d;color:#fff}
.btn-success:active{filter:brightness(.9)}
.btn-sm{padding:10px 14px;font-size:13px}

/* ── FORM ── */
.form-lbl{font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--txt3);margin-bottom:6px;display:block}
.form-ctrl{width:100%;padding:12px 14px;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);color:var(--txt);font-size:14px;outline:none;resize:vertical}
.form-ctrl:focus{border-color:var(--red);box-shadow:0 0 0 3px var(--red-glow)}
.form-group{margin-bottom:14px}

/* ── TOAST ── */
#toasts{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:9000;display:flex;flex-direction:column;align-items:center;gap:8px;pointer-events:none;width:calc(100% - 32px);max-width:400px}
.toast{background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:12px 16px;font-size:13px;font-weight:600;animation:toastIn .3s ease;box-shadow:var(--sh);width:100%;text-align:center;pointer-events:auto}
.toast.success{border-left:3px solid var(--green)}
.toast.error{border-left:3px solid var(--red)}
.toast.warning{border-left:3px solid var(--yellow)}
@keyframes toastIn{from{opacity:0;transform:translateY(20px)}}

/* ── ESTADO ACTIONS FIXED ── */
.bottom-bar{position:sticky;bottom:0;background:var(--bg1);border-top:1px solid var(--border);padding:12px 16px;display:flex;gap:10px;flex-shrink:0}

/* ── LOADING SPINNER ── */
.spin{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--red);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── EMPTY ── */
.hint{font-size:12px;color:var(--txt3);margin-top:4px}
</style>
</head>
<body>

<!-- LOADER -->
<div id="loader">
  <div style="font-size:24px;font-weight:900;letter-spacing:2px;color:var(--red)">ALCON OPS</div>
  <div class="ld-bar-wrap"><div class="ld-bar"></div></div>
  <div class="ld-txt">Panel operador</div>
</div>

<!-- SCREEN: LOGIN -->
<div id="screenLogin" class="screen">
  <div class="login-card">
    <div class="login-logo">ALCON OPS</div>
    <div class="login-sub">Panel Operador</div>
    <div class="login-err" id="loginErr"></div>
    <label class="login-label">Correo</label>
    <input class="login-input" id="loginEmail" type="email" placeholder="operador@empresa.com" autocomplete="email"/>
    <label class="login-label">Contraseña</label>
    <input class="login-input" id="loginPwd" type="password" placeholder="••••••••" autocomplete="current-password"/>
    <button class="login-btn" id="loginBtn" onclick="doLogin()">Ingresar →</button>
  </div>
</div>

<!-- SCREEN: BANDEJA -->
<div id="screenBandeja" class="screen">
  <div class="hdr">
    <div class="hdr-logo">ALCON</div>
    <div class="hdr-sep"></div>
    <div class="hdr-title" id="hdrNombre">Operador</div>
    <span id="hdrBadge" class="hdr-badge" style="display:none"></span>
    <button class="hdr-btn" onclick="doLogout()">Salir</button>
  </div>
  <div class="scroll-area">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <div class="section-title" style="margin-bottom:0">Mis órdenes</div>
      <button class="btn-ghost btn-sm btn" style="width:auto" onclick="cargarOrdenes()">🔄 Actualizar</button>
    </div>
    <!-- Filtros rápidos -->
    <div style="display:flex;gap:8px;margin-bottom:16px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px">
      <button class="filtro-btn activo" data-f="todas" onclick="setFiltro(this,'todas')">Todas</button>
      <button class="filtro-btn" data-f="pendiente" onclick="setFiltro(this,'pendiente')">Pendientes</button>
      <button class="filtro-btn" data-f="en_proceso" onclick="setFiltro(this,'en_proceso')">En proceso</button>
      <button class="filtro-btn" data-f="completada" onclick="setFiltro(this,'completada')">Completadas</button>
    </div>
    <style>.filtro-btn{border:1px solid var(--border2);background:var(--bg3);color:var(--txt3);padding:7px 14px;border-radius:999px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;flex-shrink:0}.filtro-btn.activo{background:var(--red);color:#fff;border-color:var(--red)}</style>
    <div id="listOrdenes">
      <div style="text-align:center;padding:40px;color:var(--txt3)"><div class="spin" style="margin:0 auto 12px"></div><br>Cargando órdenes...</div>
    </div>
  </div>
</div>

<!-- SCREEN: DETALLE ORDEN -->
<div id="screenDetalle" class="screen">
  <div class="hdr">
    <button class="hdr-back" onclick="volverBandeja()">‹</button>
    <div class="hdr-title" id="detTitulo">Orden</div>
    <div id="detPill"></div>
  </div>
  <div class="tabs" id="detTabs">
    <button class="tab-btn active" onclick="detGoTab(0)">Info</button>
    <button class="tab-btn" onclick="detGoTab(1)">Checklist</button>
    <button class="tab-btn" onclick="detGoTab(2)">Fotos</button>
    <button class="tab-btn" onclick="detGoTab(3)">Firma</button>
    <button class="tab-btn" onclick="detGoTab(4)">Notas</button>
  </div>
  <!-- TAB 0: INFO -->
  <div id="tabInfo" class="scroll-area" style="display:flex;flex-direction:column">
    <div id="detInfoContent"></div>
    <div class="section-title" style="margin-top:4px">Cambiar estado</div>
    <div class="estado-grid" id="estadoGrid"></div>
    <div class="form-group">
      <label class="form-lbl">Observación del cambio</label>
      <textarea class="form-ctrl" id="estadoObs" rows="3" placeholder="Describe brevemente el cambio de estado..."></textarea>
    </div>
    <button class="btn btn-primary" id="btnGuardarEstado" onclick="guardarEstado()">💾 Guardar estado</button>
  </div>
  <!-- TAB 1: CHECKLIST -->
  <div id="tabChecklist" style="display:none;flex-direction:column;flex:1">
    <div class="scroll-area" style="flex:1" id="checklistContent"></div>
    <div class="bottom-bar">
      <button class="btn btn-success" onclick="guardarChecklist()">✅ Guardar checklist</button>
    </div>
  </div>
  <!-- TAB 2: FOTOS -->
  <div id="tabFotos" style="display:none;flex-direction:column;flex:1">
    <div class="scroll-area" style="flex:1">
      <div class="foto-grid" id="fotoGrid"></div>
      <input type="file" id="fotoInput" accept="image/*" multiple onchange="onFotoSelect(event)"/>
      <div class="form-group">
        <label class="form-lbl">Descripción de fotos</label>
        <textarea class="form-ctrl" id="fotoDesc" rows="2" placeholder="Observación general de las fotos..."></textarea>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="subirFotos()">📤 Subir fotos</button>
    </div>
  </div>
  <!-- TAB 3: FIRMA -->
  <div id="tabFirma" style="display:none;flex-direction:column;flex:1">
    <div class="scroll-area" style="flex:1">
      <div class="section-title">Firma del receptor</div>
      <canvas id="firmaCanvas" height="200"></canvas>
      <div class="firma-btns">
        <button class="btn btn-ghost btn-sm" onclick="limpiarFirma()">🗑️ Limpiar</button>
        <button class="btn btn-primary btn-sm" onclick="guardarFirma()">💾 Guardar firma</button>
      </div>
      <div class="firma-estado" id="firmaEstado">✅ Firma guardada</div>
      <div style="margin-top:20px">
        <div class="section-title">Datos del receptor</div>
        <div class="form-group">
          <label class="form-lbl">Nombre de quien recibe *</label>
          <input class="form-ctrl" id="nombreRecibe" placeholder="Nombre completo" type="text"/>
        </div>
        <div class="form-group">
          <label class="form-lbl">Celular (opcional)</label>
          <input class="form-ctrl" id="celularRecibe" placeholder="+57 300 0000000" type="tel"/>
        </div>
      </div>
      <div id="firmaGuardada" style="display:none;margin-top:12px">
        <div class="section-title">Firma guardada</div>
        <img id="firmaImg" style="width:100%;border-radius:var(--r2);border:1px solid var(--border)"/>
      </div>
    </div>
  </div>
  <!-- TAB 4: NOTAS -->
  <div id="tabNotas" style="display:none;flex-direction:column;flex:1">
    <div class="scroll-area" style="flex:1">
      <div id="listComentarios"></div>
      <div class="form-group">
        <label class="form-lbl">Nueva nota / novedad</label>
        <textarea class="form-ctrl" id="nuevoComentario" rows="4" placeholder="Escribe una observación, novedad o hallazgo..."></textarea>
      </div>
    </div>
    <div class="bottom-bar">
      <button class="btn btn-primary" onclick="guardarComentario()">💬 Agregar nota</button>
    </div>
  </div>
</div>

<!-- TOASTS -->
<div id="toasts"></div>

<script>
// ═══════════════════════════════════
// SUPABASE CLIENT

function esc(s){ if(!s) return ''; return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;'); }
function toast(msg, type='success'){ const t=document.createElement('div'); t.className=`toast ${type}`; t.textContent=msg; document.getElementById('toasts').appendChild(t); setTimeout(()=>t.remove(),3500); }
function showScreen(id){ document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function hideLoader(){ const l=document.getElementById('loader'); l.classList.add('fade'); setTimeout(()=>l.style.display='none',600); }
function fmtDate(d){ if(!d) return '—'; try{ const dt=new Date(d); return dt.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+dt.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}); }catch(e){ return d; } }
function pillHtml(estado){
  const cls = `pill pill-${(estado||'pendiente').replace(/ /g,'_')}`;
  return `<span class="${cls}">${(estado||'pendiente').replace('_',' ')}</span>`;
}
function priorityClass(p){ if(p==='urgente') return 'urgente'; if(p==='alta') return 'alta'; return 'normal'; }

async function doLogin(){
  const email = document.getElementById('loginEmail').value.trim();
  const pwd   = document.getElementById('loginPwd').value;
  const errEl = document.getElementById('loginErr');
  const btn   = document.getElementById('loginBtn');
  errEl.style.display='none';
  if(!email||!pwd){ errEl.textContent='Completa todos los campos'; errEl.style.display='block'; return; }
  btn.textContent='Ingresando...'; btn.disabled=true;
  try{
    const {error} = await sb.auth.signInWithPassword({email, password:pwd});
    if(error){ errEl.textContent=error.message; errEl.style.display='block'; btn.textContent='Ingresar →'; btn.disabled=false; return; }
    await initApp();
  }catch(e){
    errEl.textContent='Error: '+e.message; errEl.style.display='block'; btn.textContent='Ingresar →'; btn.disabled=false;
  }
}

async function doLogout(){
  await sb.auth.signOut();
  _user=null; _empresaId=null;
  showScreen('screenLogin');
}

async function cargarOrdenes(){
  const cont = document.getElementById('listOrdenes');
  cont.innerHTML = '<div style="text-align:center;padding:40px;color:var(--txt3)"><div class="spin" style="margin:0 auto 12px"></div><br>Cargando...</div>';
  try{
    // Obtener órdenes asignadas a este usuario
    const {data:asignados} = await sb.from('ordenes_operativas_asignados').select('orden_id').eq('user_id',_user.id);
    if(!asignados||!asignados.length){ _ordenes=[]; renderOrdenes(); return; }
    const ids = asignados.map(a=>a.orden_id);

    const {data:ordenes,error} = await sb.from('ordenes_operativas').select('*, logistica_ordenes(nro, tipo_movimiento, estado, maquina_id)').in('id',ids).eq('empresa_id',_empresaId).order('created_at',{ascending:false});
    if(error) throw error;
    _ordenes = ordenes||[];
    renderOrdenes();
  }catch(e){ cont.innerHTML=`<div style="color:var(--red);padding:24px;text-align:center">Error: ${esc(e.message)}</div>`; }
}

async function abrirOrden(id){
  const orden = _ordenes.find(o=>o.id===id);
  if(!orden) return;
  _ordenActual = orden;
  _checklistItems = {};
  _fotos = [];
  _fotosSubidas = [];
  firmaGuardada = false;
  _tabActual = 0;

  document.getElementById('detTitulo').textContent = orden.titulo||'Orden';
  document.getElementById('detPill').innerHTML = pillHtml(orden.estado);

  // Cargar items del checklist
  const {data:items} = await sb.from('ordenes_operativas_items').select('*').eq('orden_id',id);
  if(items && items.length){
    items.forEach(it=>{ _checklistItems[it.item] = {resultado:it.resultado, comentario:it.comentario||'', dbId:it.id}; });
  }

  // Cargar fotos subidas
  const {data:fotos} = await sb.from('ordenes_operativas_fotos').select('*').eq('orden_id',id);
  _fotosSubidas = fotos||[];

  // Cargar firma
  const {data:firma} = await sb.from('ordenes_operativas_firmas').select('*').eq('orden_id',id).eq('tipo','receptor').maybeSingle();
  if(firma){
    firmaGuardada=true;
    document.getElementById('firmaEstado').classList.add('show');
    if(firma.firma_data){ document.getElementById('firmaImg').src=firma.firma_data; document.getElementById('firmaGuardada').style.display='block'; }
    if(firma.nombre_receptor) document.getElementById('nombreRecibe').value=firma.nombre_receptor;
    if(firma.celular_receptor) document.getElementById('celularRecibe').value=firma.celular_receptor;
  } else {
    document.getElementById('firmaEstado').classList.remove('show');
    document.getElementById('firmaGuardada').style.display='none';
    document.getElementById('nombreRecibe').value='';
    document.getElementById('celularRecibe').value='';
  }

  renderDetInfo();
  renderChecklist();
  renderFotos();
  renderComentarios();
  detGoTab(0);
  showScreen('screenDetalle');
}

let _estadoSel = null;
function selEstado(k, el){
  _estadoSel = k;

async function guardarEstado(){
  if(!_estadoSel){ toast('Selecciona un estado','warning'); return; }
  const obs       = document.getElementById('estadoObs').value.trim();
  const nombreEnt = document.getElementById('nombreEntrega')?.value.trim();
  const btn       = document.getElementById('btnGuardarEstado');

  // Novedad requiere descripción
  if(_estadoSel==='con_novedad' && !obs){
    toast('⚠️ Describe la novedad en el campo de observación','warning');
    document.getElementById('estadoObs').focus();
    return;
  }

  btn.disabled=true; btn.textContent='Guardando...';
  try{
    const upd = {estado:_estadoSel, updated_at:new Date().toISOString()};
    if(nombreEnt) upd.nombre_entrega=nombreEnt;
    if(_estadoSel==='en_proceso' && !_ordenActual.fecha_inicio) upd.fecha_inicio=new Date().toISOString();
    if(_estadoSel==='completada'){
      upd.fecha_cierre=new Date().toISOString();
      if(obs) upd.observaciones_cierre=obs;
    }
    if(_estadoSel==='entregada') upd.fecha_cierre=new Date().toISOString();

    const {error} = await sb.from('ordenes_operativas').update(upd).eq('id',_ordenActual.id);
    if(error) throw error;

    // Comentario automático de cambio de estado
    if(obs){
      await sb.from('ordenes_operativas_comentarios').insert({
        orden_id:_ordenActual.id, empresa_id:_empresaId, user_id:_user.id,
        texto:`[${_estadoSel.replace(/_/g,' ').toUpperCase()}] ${obs}`, tipo:'estado',
        created_at:new Date().toISOString(),
      });
    }

    // Registrar novedad en tabla dedicada
    if(_estadoSel==='con_novedad'){
      try{
        await sb.from('ordenes_operativas_novedades').insert({
          orden_id:_ordenActual.id, empresa_id:_empresaId,
          descripcion:obs, estado:'abierta',
          created_by:_user.id, created_at:new Date().toISOString(),
        });
      }catch(eNov){ console.warn('[OL] novedades insert:',eNov.message); }
      toast('⚠️ Novedad registrada','warning');
    } else if(_estadoSel==='entregada'){
      // Sincronizar la RS de logística vinculada
      if(_ordenActual.logistica_orden_id){
        try{
          await sb.from('logistica_ordenes').update({estado:'entregada'}).eq('id',_ordenActual.logistica_orden_id);
        }catch(eLS){ console.warn('[OL] sync logistica_ordenes:', eLS.message); }
      }
      toast('✅ Orden entregada','success');
      _ordenActual.estado = _estadoSel;
      btn.disabled=false; btn.textContent='💾 Guardar estado';
      volverBandeja();
      return;
    } else if(_estadoSel==='completada'){
      const tipoMsg = _ordenActual.tipo==='entrega' ? '🚀 Alquiler activado' : _ordenActual.tipo==='recogida'||_ordenActual.tipo==='devolucion' ? '📦 Equipo en bodega' : '';
      toast('✅ Orden completada'+(tipoMsg?' · '+tipoMsg:''),'success');
    } else {
      toast('✅ Estado actualizado','success');
    }

    _ordenActual.estado = _estadoSel;
    document.getElementById('detPill').innerHTML = pillHtml(_estadoSel);
    document.getElementById('estadoObs').value='';
    _estadoSel=null;
    renderDetInfo();  // refrescar grid de estados
  }catch(e){ toast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='💾 Guardar estado';
}

function renderChecklist(){
  const cont = document.getElementById('checklistContent');
  cont.innerHTML = CHECKLIST_ITEMS.map((item,i)=>{
    const cur = _checklistItems[item]||{resultado:null,comentario:''};
    return `<div class="chk-item">
      <div class="chk-label">${i+1}. ${esc(item)}</div>
      <div class="chk-btns">
        <button class="chk-btn${cur.resultado==='bueno'?' sel-bueno':''}" onclick="setChk('${esc(item)}','bueno',this)">✅ Bueno</button>
        <button class="chk-btn${cur.resultado==='malo'?' sel-malo':''}" onclick="setChk('${esc(item)}','malo',this)">❌ Malo</button>
        <button class="chk-btn${cur.resultado==='no_aplica'?' sel-na':''}" onclick="setChk('${esc(item)}','no_aplica',this)">— N/A</button>
      </div>
      <textarea class="chk-comment form-ctrl${cur.comentario?' show':''}" id="chkCom_${i}" placeholder="Comentario opcional..." onchange="setChkComment('${esc(item)}',this.value)">${esc(cur.comentario||'')}</textarea>
    </div>`;
  }).join('');
}

function setChk(item, resultado, el){
  const parent = el.closest('.chk-item');
  parent.querySelectorAll('.chk-btn').forEach(b=>{ b.className='chk-btn'; });
  const cls = resultado==='bueno'?'sel-bueno':resultado==='malo'?'sel-malo':'sel-na';
  el.classList.add(cls);
  if(!_checklistItems[item]) _checklistItems[item]={resultado:null,comentario:''};
  _checklistItems[item].resultado = resultado;
  // Mostrar comentario si es malo
  const com = parent.querySelector('.chk-comment');
  if(resultado==='malo'){ com.classList.add('show'); }
}

function setChkComment(item, val){
  if(!_checklistItems[item]) _checklistItems[item]={resultado:null,comentario:''};
  _checklistItems[item].comentario = val;
}

async function guardarChecklist(){
  const btn = document.querySelector('#tabChecklist .btn-success');
  btn.disabled=true; btn.textContent='Guardando...';
  try{
    for(const item of CHECKLIST_ITEMS){
      const cur = _checklistItems[item];
      const data = {
        orden_id:_ordenActual.id, empresa_id:_empresaId,
        item, resultado:cur?.resultado||null, comentario:cur?.comentario||null,
        orden_visual:CHECKLIST_ITEMS.indexOf(item), updated_at:new Date().toISOString(),
      };
      if(cur?.dbId){
        await sb.from('ordenes_operativas_items').update(data).eq('id',cur.dbId);
      } else {
        const {data:r} = await sb.from('ordenes_operativas_items').insert(data).select('id').single();
        if(r && _checklistItems[item]) _checklistItems[item].dbId = r.id;
      }
    }
    toast('✅ Checklist guardado','success');
  }catch(e){ toast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='✅ Guardar checklist';
}

    if(f.url) html+=`<div class="foto-item"><img src="${esc(f.url)}" loading="lazy"/><button class="foto-del" onclick="eliminarFoto('${esc(f.id)}',${i})">✕</button></div>`;
  });
  // Fotos pendientes de subir
  _fotos.forEach((f,i)=>{
    html+=`<div class="foto-item"><img src="${f.preview}"/><button class="foto-del" onclick="eliminarFotoPendiente(${i})">✕</button></div>`;
  });
  // Botón agregar
  html+=`<div class="foto-add" onclick="document.getElementById('fotoInput').click()"><span class="foto-add-icon">📷</span><span class="foto-add-txt">Agregar foto</span></div>`;
  grid.innerHTML = html;
}

function onFotoSelect(e){
  const files = Array.from(e.target.files);
  files.forEach(file=>{
    const reader = new FileReader();
    reader.onload = ev=>{ _fotos.push({file, preview:ev.target.result}); renderFotos(); };
    reader.readAsDataURL(file);
  });
  e.target.value='';
}

async function subirFotos(){
  if(!_fotos.length){ toast('No hay fotos nuevas para subir','warning'); return; }
  const btn = document.querySelector('#tabFotos .btn-primary');
  btn.disabled=true; btn.textContent='Subiendo...';
  const desc = document.getElementById('fotoDesc').value.trim();
  let subidas=0;
  for(const f of _fotos){
    try{
      // Upload a Supabase Storage
      const ext = f.file.name.split('.').pop()||'jpg';
      const path = `${_empresaId}/${_ordenActual.id}/${Date.now()}.${ext}`;
      const {error:upErr} = await sb.storage.from('ordenes-evidencias').upload(path, f.file, {upsert:true});
      let url=null;
      if(!upErr){
        const {data:urlData} = sb.storage.from('ordenes-evidencias').getPublicUrl(path);
        url = urlData?.publicUrl||null;
      }
      // Guardar registro
      await sb.from('ordenes_operativas_fotos').insert({
        orden_id:_ordenActual.id, empresa_id:_empresaId, user_id:_user.id,
        bucket:'ordenes-evidencias', path, url, descripcion:desc||null,
        subido_at:new Date().toISOString(),
      });
      subidas++;
    }catch(e2){ console.error('foto err',e2); }
  }
  _fotos=[];
  document.getElementById('fotoDesc').value='';
  // Recargar fotos
  const {data:fotos2} = await sb.from('ordenes_operativas_fotos').select('*').eq('orden_id',_ordenActual.id);
  _fotosSubidas = fotos2||[];
  renderFotos();
  toast(`✅ ${subidas} foto(s) subidas`,'success');
  btn.disabled=false; btn.textContent='📤 Subir fotos';
}

async function eliminarFoto(id, idx){
  if(!confirm('¿Eliminar esta foto?')) return;
  await sb.from('ordenes_operativas_fotos').delete().eq('id',id);
  _fotosSubidas.splice(idx,1);
  renderFotos();
}

function eliminarFotoPendiente(idx){
  _fotos.splice(idx,1);
  renderFotos();
}

// ── FIRMA TAB ───────────────────────
function initFirmaCanvas(){
  const canvas = document.getElementById('firmaCanvas');
  canvas.width = canvas.offsetWidth * window.devicePixelRatio || 360;
  canvas.height = 200 * window.devicePixelRatio || 200;
  canvas.style.width = '100%';
  canvas.style.height = '200px';
  firmaCtx = canvas.getContext('2d');
  firmaCtx.scale(window.devicePixelRatio||1, window.devicePixelRatio||1);
  firmaCtx.lineWidth=2.5; firmaCtx.lineCap='round'; firmaCtx.strokeStyle='#111';
  firmaCtx.fillStyle='#fff'; firmaCtx.fillRect(0,0,canvas.width,canvas.height);

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    if(e.touches){ return {x:e.touches[0].clientX-r.left, y:e.touches[0].clientY-r.top}; }
    return {x:e.clientX-r.left, y:e.clientY-r.top};
  }
  canvas.onmousedown=canvas.ontouchstart=(e)=>{ e.preventDefault(); firmaDibujando=true; const p=getPos(e); firmaCtx.beginPath(); firmaCtx.moveTo(p.x,p.y); };
  canvas.onmousemove=canvas.ontouchmove=(e)=>{ e.preventDefault(); if(!firmaDibujando) return; const p=getPos(e); firmaCtx.lineTo(p.x,p.y); firmaCtx.stroke(); };
  canvas.onmouseup=canvas.ontouchend=()=>{ firmaDibujando=false; };
}

function limpiarFirma(){
  if(!firmaCtx) return;
  const c=document.getElementById('firmaCanvas');
  firmaCtx.fillStyle='#fff'; firmaCtx.fillRect(0,0,c.width,c.height);
  document.getElementById('firmaEstado').classList.remove('show');
  firmaGuardada=false;
}

async function guardarFirma(){
  const canvas=document.getElementById('firmaCanvas');
  const nombre=document.getElementById('nombreRecibe').value.trim();
  const celular=document.getElementById('celularRecibe').value.trim();
  if(!nombre){ toast('Ingresa el nombre de quien recibe','warning'); return; }
  const dataUrl=canvas.toDataURL('image/png');
  try{
    // Borrar firma anterior si existe
    await sb.from('ordenes_operativas_firmas').delete().eq('orden_id',_ordenActual.id).eq('tipo','receptor');
    await sb.from('ordenes_operativas_firmas').insert({
      orden_id:_ordenActual.id, empresa_id:_empresaId, user_id:_user.id,
      tipo:'receptor', firma_data:dataUrl, nombre_receptor:nombre,
      celular_receptor:celular||null, firmado_at:new Date().toISOString(),
    });
    firmaGuardada=true;
    document.getElementById('firmaEstado').classList.add('show');
    document.getElementById('firmaImg').src=dataUrl;
    document.getElementById('firmaGuardada').style.display='block';
    // Actualizar nombre_recibe en orden
    await sb.from('ordenes_operativas').update({nombre_recibe:nombre, celular_recibe:celular||null}).eq('id',_ordenActual.id);
    toast('✅ Firma guardada','success');
  }catch(e){ toast('Error: '+e.message,'error'); }
}

// ── COMENTARIOS TAB ─────────────────
async function renderComentarios(){
  const cont=document.getElementById('listComentarios');
  const {data:coms} = await sb.from('ordenes_operativas_comentarios').select('*').eq('orden_id',_ordenActual.id).order('created_at',{ascending:false});
  if(!coms||!coms.length){ cont.innerHTML='<div style="color:var(--txt3);font-size:13px;margin-bottom:16px">Sin notas aún.</div>'; return; }
  cont.innerHTML=coms.map(c=>`
    <div class="com-item">
      <div class="com-meta">${fmtDate(c.created_at)} ${c.tipo?`· ${c.tipo}`:''}</div>
      <div class="com-txt">${esc(c.texto)}</div>
    </div>`).join('');
}

async function guardarComentario(){
  const txt=document.getElementById('nuevoComentario').value.trim();
  if(!txt){ toast('Escribe una nota primero','warning'); return; }
  const btn=document.querySelector('#tabNotas .btn-primary');
  btn.disabled=true; btn.textContent='Guardando...';
  try{
    await sb.from('ordenes_operativas_comentarios').insert({
      orden_id:_ordenActual.id, empresa_id:_empresaId, user_id:_user.id,
      texto:txt, tipo:'operador', created_at:new Date().toISOString(),
    });
    document.getElementById('nuevoComentario').value='';
    toast('✅ Nota guardada','success');
    await renderComentarios();
  }catch(e){ toast('Error: '+e.message,'error'); }
  btn.disabled=false; btn.textContent='💬 Agregar nota';
}
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}
</script>
